<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legal Client Tracker — клиенты и статусы дел</title>
    <script>
      // runs before paint so the dark class is set before React mounts —
      // avoids a flash of the wrong theme on load. Keep the storage key in
      // sync with THEME_KEY in src/lib/theme.ts.
      (function () {
        try {
          var stored = localStorage.getItem("legal-client-tracker:theme");
          var dark =
            stored === "dark" ||
            (stored !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
